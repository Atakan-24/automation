<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shin Zero Logs</title>
<style>
body {margin:0;background:#01030c;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;gap:12px;}
#canvas {width:94vw;max-width:960px;padding:32px;border-radius:28px;background:linear-gradient(180deg,#0b111f,#02030c);border:2px solid rgba(255,255,255,0.2);box-shadow:0 25px 40px rgba(0,0,0,0.7);position:relative;overflow:hidden;}
#title {text-align:center;margin-bottom:8px;font-size:18px;letter-spacing:8px;color:#9cc0ff;}
#art {font-size:9px;line-height:1;white-space:pre;margin:0;}
#art.alt {position:absolute;top:0;left:0;right:0;bottom:0;display:block;opacity:0;transition:opacity .8s ease;}
#art.show {opacity:1;}
#log-panel {width:94vw;max-width:960px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;box-shadow:0 10px 20px rgba(0,0,0,0.3);}
#log-panel h2 {margin:0 0 8px;font-size:16px;color:#fefefe;}
#log {max-height:160px;overflow:auto;font-size:12px;color:#d5d8ff;}
#log div {padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1);}
.glow {position:absolute;inset:16px;background:radial-gradient(circle at center,rgba(230,7,104,0.25),transparent 220px);pointer-events:none;}
</style>
</head>
<body>
<div class="glow"></div>
<div id="page">
  <div id="canvas">
    <div id="title">SHIN ZERO LOGS</div>
    <pre id="art" class="show">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
    <pre id="alt" class="alt">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⠿⠛⣉⠄⣢⣴⣟⣫⣤⣾⢿⣿⣷⡶⢦⣬⣉⠻⢿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
    <div id="caption">We toggle between Shin Zero art while working.</div>
  </div>
  <div id="log-panel">
    <h2>Shin Zero Logbook</h2>
    <div id="log"></div>
  </div>
</div>
<script>
const art=document.getElementById('art');
const alt=document.getElementById('alt');
setInterval(()=>{art.classList.toggle('show');alt.classList.toggle('show');},4000);
const log=document.getElementById('log');
const status=[
  '2026-03-20T21:00:00 – Renewed art deployment',
  '2026-03-20T21:02:00 – Created tracking panel',
  '2026-03-20T21:04:00 – Logged latest ASCII update'
];
status.forEach(text=>{const div=document.createElement('div');div.textContent=text;log.appendChild(div);});
</script>
</body>
</html>
