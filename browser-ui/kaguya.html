<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shin Zero Logs</title>
<style>
body {margin:0;background:#01030c;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;gap:16px;}
#canvas {width:94vw;max-width:960px;padding:32px;border-radius:28px;background:linear-gradient(180deg,#05080f,#01030c);border:2px solid rgba(255,255,255,0.15);box-shadow:0 20px 40px rgba(0,0,0,0.7);position:relative;}
#title {text-align:center;margin-bottom:12px;font-size:20px;letter-spacing:6px;color:#9cc0ff;}
#art {font-size:9px;line-height:1;white-space:pre;margin:0;color:#eef6ff;}
#caption {margin-top:12px;font-size:12px;text-align:center;color:#a4a8c6;}
#log-panel {width:94vw;max-width:960px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;box-shadow:0 10px 20px rgba(0,0,0,0.3);}
#log-panel h2 {margin:0 0 8px;font-size:16px;color:#fefefe;letter-spacing:2px;}
#log {max-height:250px;overflow:auto;font-size:13px;line-height:1.4;color:#e4e6ff;}
#log div {padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1);} 
#log div:last-child {border-bottom:none;}
.sup {color:#7f85a3;font-size:11px;}
.glow {position:absolute;inset:20px;background:radial-gradient(circle at 50% 30%,rgba(230,7,104,0.25),transparent 220px);pointer-events:none;}
#spinner {position:absolute;right:20px;top:20px;font-size:12px;color:#7f85a3;}
</style>
</head>
<body>
<div id="page">
  <div id="canvas">
    <div class="glow"></div>
    <div id="title">SHIN ZERO LOGS</div>
    <pre id="art">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
    <div id="caption">Ich wechsle zwischen deinen Kampfkünstlern, damit du sehen kannst, woran ich arbeite.</div>
    <div id="spinner">loading logs...</div>
  </div>
  <div id="log-panel">
    <h2>Shin Zero Logbook</h2>
    <div id="log"></div>
  </div>
</div>
<script>
const logEl=document.getElementById('log');
const spinner=document.getElementById('spinner');
const logUrl='https://raw.githack.com/Atakan-24/automation/main/data/status.json';
fetch(logUrl)
  .then(r=>r.json())
  .then(data=>{
    spinner.textContent='';
    if(data.log && data.log.length){
      data.log.slice().reverse().forEach(entry=>{
        const div=document.createElement('div');
        const [time,msg]=entry.split(' – ');
        div.innerHTML=`<span class="sup">${time}</span><br>${msg}`;
        logEl.appendChild(div);
      });
    } else {
      logEl.innerHTML='<div>Keine Einträge vorhanden.</div>';
    }
  })
  .catch(()=>{
    spinner.textContent='Log konnte nicht geladen werden.';
    logEl.innerHTML='<div>Fetch-Fehler – bitte Seite neu laden.</div>';
  });
</script>
</body>
</html>
