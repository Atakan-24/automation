<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris Mobile</title>
  <style>
    html, body { margin:0; padding:0; background:#111; color:#fff; font-family:monospace; min-height:100vh; }
    #container {display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-start; padding:16px;}
    #game {background:#000; border:5px solid #222; touch-action:none;}
    #hud {display:flex; flex-direction:column; margin-left:16px;}
    #hud span {margin-bottom:8px;}
    #controls {display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;}
    button {background:#222; color:#fff; border:1px solid #555; padding:12px 18px; font-size:16px; border-radius:6px; flex:1; min-width:100px;}
    @media (max-width:800px){#container{flex-direction:column; align-items:center;}#hud{margin:12px 0 0;}#controls button{min-width:120px;}}
  </style>
</head>
<body>
  <div id="container">
    <canvas id="game" width="300" height="600"></canvas>
    <div id="hud">
      <span id="score">Score: 0</span>
      <span id="level">Level: 1</span>
      <span id="status">Status: running</span>
      <button id="restart">Restart</button>
      <div id="controls">
        <button data-action="left">Links</button>
        <button data-action="right">Rechts</button>
        <button data-action="rotate">Rotieren</button>
        <button data-action="down">Schnell</button>
      </div>
    </div>
  </div>
  <script src="browser-ui/tetris_web.js"></script>
</body>
</html>
