<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shin Zero Art</title>
<style>
body {margin:0;background:#000209;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;}
#canvas {width:95vw;max-width:1040px;padding:32px;border-radius:36px;background:linear-gradient(180deg,#050b17,#01030c);border:none;box-shadow:0 40px 80px rgba(0,0,0,0.85);position:relative;overflow:hidden;}
#glow {position:absolute;inset:-40px;background:radial-gradient(circle at 50% 20%,rgba(230,7,104,0.65),rgba(47,97,255,0.18) 55%,transparent 75%);filter:blur(14px);animation:throb 3s ease-in-out infinite;}
@keyframes throb {0% {opacity:0.4;}50% {opacity:0.92;}100% {opacity:0.4;}}
#art {font-size:10px;line-height:1.1;white-space:pre;margin:0;color:#fefefe;text-shadow:0 0 10px rgba(255,255,255,0.35);}
#art-overlay {position:absolute;top:28px;left:28px;right:28px;opacity:0.25;pointer-events:none;font-size:10px;line-height:1.1;white-space:pre;color:#fefefe;text-shadow:0 0 15px rgba(255,255,255,0.6);}
#activity {width:90vw;max-width:980px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,0.45);}
#activity h2 {margin:0 0 8px;font-size:16px;color:#fefefe;letter-spacing:3px;text-transform:uppercase;}
#log {max-height:220px;overflow:auto;font-size:12px;line-height:1.5;color:#dfe3ff;}
#log div {padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.08);} 
#log div:last-child {border-bottom:none;}
.sup {color:#7f88b1;font-size:10px;}
</style>
</head>
<body>
<div id="page">
  <div id="canvas">
    <div id="glow"></div>
    <div id="art-overlay">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</div>
    <pre id="art">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
  </div>
  <div id="activity">
    <h2>Live Activity</h2>
    <div id="log">Loading…</div>
  </div>
</div>
<script>
const log=document.getElementById('log');
fetch('https://raw.githubusercontent.com/Atakan-24/automation/main/data/activity_log.txt')
  .then(r=>r.text())
  .then(text=>{
    log.innerHTML='';
    text.trim().split('\n').forEach(line=>{
      const div=document.createElement('div');
      div.textContent=line;
      log.appendChild(div);
    });
  })
  .catch(()=>{log.textContent='Activity log unavailable.';});
</script>
</body>
</html>
