<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shin Zero Art</title>
<style>
body {margin:0;background:#000209;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:18px;}
#canvas {width:95vw;max-width:1040px;padding:48px;border-radius:36px;background:linear-gradient(180deg,#050b17,#01030c);border:none;box-shadow:0 40px 80px rgba(0,0,0,0.85);position:relative;overflow:hidden;}
#glow {position:absolute;inset:-40px;background:radial-gradient(circle at 50% 20%,rgba(230,7,104,0.65),rgba(47,97,255,0.1) 50%,transparent 70%);filter:blur(14px);animation:throb 3s ease-in-out infinite;}
@keyframes throb {0% {opacity:0.45;}50% {opacity:0.92;}100% {opacity:0.45;}}
#title {text-align:center;margin-bottom:12px;font-size:24px;letter-spacing:8px;color:#9cc0ff;}
#art {font-size:10px;line-height:1.1;white-space:pre;margin:0;color:#fefefe;text-shadow:0 0 10px rgba(255,255,255,0.35);}
#log-panel {width:90vw;max-width:960px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:18px;box-shadow:0 18px 40px rgba(0,0,0,0.4);}
#log-panel h2 {margin:0 0 8px;font-size:16px;color:#fefefe;letter-spacing:2px;}
#log {max-height:220px;overflow:auto;font-size:12px;line-height:1.5;color:#dfe3ff;}
#log div {padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1);} 
#log div:last-child {border-bottom:none;}
.sup {color:#7f88b1;font-size:11px;}
</style>
</head>
<body>
<div id="page">
  <div id="canvas">
    <div id="glow"></div>
    <div id="title">SHIN ZERO LIVE LOG</div>
    <pre id="art">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
  </div>
  <div id="log-panel">
    <h2>Latest Actions</h2>
    <div id="log"></div>
  </div>
</div>
<script>
const entries=[
  '2026-03-21T01:20:00 – Glow pulses indicate activity',
  '2026-03-21T01:25:00 – Logbook entries simplified and embedded',
  '2026-03-21T01:30:00 – ASCII focus reinforced, no boxes',
  '2026-03-21T01:35:00 – Artwork refreshed for clarity'
];
const log=document.getElementById('log');
entries.forEach(item=>{
  const [time,msg]=item.split(' – ');
  const div=document.createElement('div');
  div.innerHTML=`<span class="sup">${time}</span><br>${msg}`;
  log.appendChild(div);
});
</script>
</body>
</html>
