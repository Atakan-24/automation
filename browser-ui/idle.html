<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shin Zero Live</title>
<style>
body {margin:0;background:#000209;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px;gap:18px;}
#log-panel {width:90vw;max-width:1100px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:18px;box-shadow:0 20px 40px rgba(0,0,0,0.45);}
#log-panel h2 {margin:0 0 8px;font-size:16px;letter-spacing:3px;text-transform:uppercase;color:#fefefe;}
#log {max-height:260px;overflow:auto;font-size:12px;line-height:1.5;color:#dfe3ff;}
#log div {padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.08);} 
#log div:last-child {border-bottom:none;}
.sup {color:#7f88b1;font-size:10px;}
#canvas {width:95vw;max-width:1040px;padding:48px;border-radius:36px;background:linear-gradient(180deg,#050b17,#01030c);box-shadow:0 40px 80px rgba(0,0,0,0.85);position:relative;overflow:hidden;}
#glow {position:absolute;inset:-40px;background:radial-gradient(circle at 50% 20%,rgba(230,7,104,0.65),rgba(47,97,255,0.2) 45%,transparent 70%);filter:blur(14px);animation:throb 3s ease-in-out infinite;}
@keyframes throb {0% {opacity:0.4;}50% {opacity:0.92;}100% {opacity:0.4;}}
#art {margin:0;font-size:10px;line-height:1.05;white-space:pre;color:#fefefe;text-shadow:0 0 10px rgba(255,255,255,0.35);}
</style>
</head>
<body>
<div id="page">
  <div id="log-panel">
    <h2>Live Activity</h2>
    <div id="log">Loading live updates…</div>
  </div>
  <div id="canvas">
    <div id="glow"></div>
    <pre id="art">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
  </div>
</div>
<script>
const logDiv=document.getElementById('log');
const logUrl='https://raw.githubusercontent.com/Atakan-24/automation/main/data/activity_log.txt';
function refreshLog(){
  fetch(logUrl)
    .then(r=>r.text())
    .then(text=>{
      logDiv.innerHTML='';
      text.trim().split('\n').reverse().forEach(line=>{
        const entry=document.createElement('div');
        entry.textContent=line;
        logDiv.appendChild(entry);
      });
    })
    .catch(()=>{logDiv.textContent='Unable to load live updates.';});
}
refreshLog();
setInterval(refreshLog,10000);
</script>
</body>
</html>
