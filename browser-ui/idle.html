<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shin Zero Art</title>
<style>
body {margin:0;background:#000209;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;}
#canvas {width:95vw;max-width:1040px;padding:48px;border-radius:36px;background:linear-gradient(180deg,#050b17,#01030c);border:none;box-shadow:0 40px 80px rgba(0,0,0,0.85);position:relative;overflow:hidden;}
#glow {position:absolute;inset:-40px;background:radial-gradient(circle at 50% 30%,rgba(230,7,104,0.55),rgba(47,97,255,0.2) 55%,transparent 70%);filter:blur(12px);animation:throb 3s ease-in-out infinite;}
@keyframes throb {0% {opacity:0.4;}50% {opacity:0.9;}100% {opacity:0.4;}}
#art {font-size:10px;line-height:1.1;white-space:pre;margin:0;color:#fefefe;text-shadow:0 0 8px rgba(255,255,255,0.25);}
</style>
</head>
<body>
<div id="page">
  <div id="canvas">

</body>
</html>
