<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shin Zero Live</title>
<style>
body {margin:0;background:#01010a;color:#fefefe;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 0 40px;gap:18px;}
#canvas {width:95vw;max-width:1100px;padding:40px 48px;border-radius:34px;background:linear-gradient(180deg,#0a0a15,#030209);border:1px solid rgba(255,255,255,0.15);box-shadow:0 40px 100px rgba(0,0,0,0.8);position:relative;}
#glow {position:absolute;inset:-30px;background:radial-gradient(circle at 50% 20%,rgba(230,7,104,0.65),transparent 55%);filter:blur(12px);box-shadow:0 0 30px rgba(255,0,136,0.4);}
#art {margin:0;font-size:10px;line-height:1.05;white-space:pre;}
#indicator {position:absolute;bottom:16px;right:20px;font-size:11px;color:#94a0ff;letter-spacing:0.2em;}
#log-panel {width:90vw;max-width:1100px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;box-shadow:0 20px 40px rgba(0,0,0,0.4);}
#log-panel h2 {margin:0 0 8px;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:#fefefe;}
#log {max-height:260px;overflow:auto;font-size:12px;line-height:1.6;color:#dfe3ff;display:grid;gap:4px;}
#log div {padding:6px 10px;border-bottom:1px dashed rgba(255,255,255,0.15);}
#log div:last-child {border-bottom:none;}
.sup {color:#7f88b1;font-size:10px;}
</style>
</head>
<body>
<div id="page">
  <div id="canvas">
    <div id="glow"></div>
    <pre id="art">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
    <div id="indicator">live updates enabled</div>
  </div>
  <div id="log-panel">
    <h2>Live Activity</h2>
    <div id="log">Loading live updates...</div>
  </div>
</div>
<script>
const logDiv=document.getElementById('log');
const logUrl='https://raw.githubusercontent.com/Atakan-24/automation/main/data/activity_log.txt';
function refreshLog(){
  fetch(logUrl)
    .then(r=>r.text())
    .then(text=>{
      logDiv.innerHTML='';
      text.trim().split('\n').reverse().forEach(line=>{
        const entry=document.createElement('div');
        entry.innerHTML=line;
        logDiv.appendChild(entry);
      });
    })
    .catch(()=>{logDiv.textContent='Unable to load live updates.';});
}
refreshLog();
setInterval(refreshLog,10000);
</script>
</body>
</html>
