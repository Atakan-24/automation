<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shin Zero Live</title>
<style>
body {margin:0;background:#000209;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:24px;}
#canvas {width:95vw;max-width:1040px;padding:48px;border-radius:36px;background:linear-gradient(180deg,#050b17,#01030c);border:none;box-shadow:0 40px 80px rgba(0,0,0,0.85);position:relative;overflow:hidden;}
#glow {position:absolute;inset:-40px;background:radial-gradient(circle at 50% 35%,rgba(230,7,104,0.65),rgba(47,97,255,0.18) 55%,transparent 75%);filter:blur(14px);animation:throb 3s ease-in-out infinite;}
@keyframes throb {0% {opacity:0.45;}50% {opacity:0.92;}100% {opacity:0.45;}}
#art {font-size:10px;line-height:1.1;white-space:pre;margin:0;color:#fefefe;text-shadow:0 0 10px rgba(255,255,255,0.35);}
#log-panel {width:94vw;max-width:960px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:16px 18px;box-shadow:0 18px 40px rgba(0,0,0,0.5);}
#log-panel h2 {margin:0 0 8px;font-size:16px;color:#fefefe;letter-spacing:3px;text-transform:uppercase;}
#log {max-height:220px;overflow:auto;font-size:12px;line-height:1.6;color:#dfe3ff;}
#log div {padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.08);} 
#log div:last-child {border-bottom:none;}
.sup {color:#7f88b1;font-size:10px;}
#helper {text-align:center;font-size:12px;color:#9aa5c4;letter-spacing:2px;}
</style>
</head>
<body>
<div id="page">
  <div id="canvas">
    <div id="glow"></div>
    <pre id="art">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
    <div id="helper">Live Artwork + Status-Log – du siehst, dass ich arbeite.</div>
  </div>
  <div id="log-panel">
    <h2>Live Log</h2>
    <div id="log">Loading…</div>
  </div>
</div>
<script>
const logEl=document.getElementById('log');
fetch('https://raw.githubusercontent.com/Atakan-24/automation/main/data/status.json')
  .then(r=>r.json())
  .then(data=>{
    logEl.innerHTML='';
    const entries=[`Goal: ${data.goal}`, `Last action: ${data.last_action}`];
    data.log.slice().reverse().forEach(entry=>entries.push(entry));
    entries.forEach(item=>{
      const [time,msg]=item.includes('–')?item.split(' – '):['',item];
      const div=document.createElement('div');
      div.innerHTML=`${time?`<span class="sup">${time}</span><br>`:''}${msg}`;
      logEl.appendChild(div);
    });
  })
  .catch(()=>{logEl.innerHTML='Log konnte nicht geladen werden.';});
</script>
</body>
</html>
