<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shin Zero Art+Log</title>
<style>
body {margin:0;background:#000209;color:#f8f8ff;font-family:'Fira Code',monospace;}
#page {min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:16px;}
#canvas {width:95vw;max-width:1040px;padding:48px;border-radius:36px;background:linear-gradient(180deg,#050b17,#01030c);border:none;box-shadow:0 40px 80px rgba(0,0,0,0.85);position:relative;}
#glow {position:absolute;inset:-40px;background:radial-gradient(circle at 50% 20%,rgba(230,7,104,0.65),rgba(47,97,255,0.18) 55%,transparent 75%);filter:blur(14px);animation:throb 3s ease-in-out infinite;}
@keyframes throb {0% {opacity:0.4;}50% {opacity:0.92;}100% {opacity:0.4;}}
#art {font-size:10px;line-height:1.1;white-space:pre;margin:0;color:#fefefe;text-shadow:0 0 10px rgba(255,255,255,0.35);}
#activity {width:90vw;max-width:980px;padding:16px;border-radius:18px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08);box-shadow:0 10px 30px rgba(0,0,0,0.5);}
#activity h2 {margin:0 0 8px;font-size:16px;color:#fefefe;letter-spacing:3px;text-align:center;}
#activity div {padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:12px;}
#activity div:last-child {border-bottom:none;}
</style>
</head>
<body>
<div id="page">
  <div id="canvas">
    <div id="glow"></div>
    <pre id="art">⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠿⠿⠛⠛⠛⠛⠻⠿⠿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿</pre>
  </div>
  <div id="activity">
    <h2>Live Activity</h2>
    <div id="log">Loading activity…</div>
  </div>
</div>
<script>
const logEl=document.getElementById('log');
fetch('../data/activity_log.txt')
  .then(r=>r.text())
  .then(text=>{
    logEl.innerHTML='';
    text.trim().split('\n').forEach(line=>{
      const div=document.createElement('div');
      div.textContent=line;
      logEl.appendChild(div);
    });
  })
  .catch(()=>{logEl.textContent='Activity log not available.';});
</script>
</body>
</html>
